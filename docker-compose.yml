services:
  spring-bot:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "bash -lc \"exec 3<>/dev/tcp/127.0.0.1/8080 && printf 'GET /api/health HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && grep '200' <&3\""]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  userbot:
    build: ./userbot
    ports:
      - "8081:8081"
    volumes:
      - ./userbot/session:/app/session
    env_file: .env
    environment:
      SPRING_DETECT_URL: http://spring-bot:8080/api/detect
    depends_on:
      spring-bot:
        condition: service_healthy
    restart: unless-stopped
