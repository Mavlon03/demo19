services:
  userbot:
    build: ./userbot
    ports:
      - "8081:8081"
    volumes:
      - ./userbot/session:/app/session
    env_file: .env
    restart: unless-stopped

  spring-bot:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      - userbot
    environment:
      PYTHON_SERVICE_URL: http://userbot:8081
    restart: unless-stopped
